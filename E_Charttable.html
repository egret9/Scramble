<!DOCTYPE html>
<html lang="ja">

<head>
    <title>obj:E_ChartTable</title>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="bmstable" content="header_E_ChartTable.json" />

    <script src="https://code.jquery.com/jquery-2.2.4.min.js"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta1/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- ★追加CSS -->
    <link rel="stylesheet" href="tropical_with_beach.css">

</head>

<body>

    <header class="mb-3">
        <nav class="navbar tropical-navbar">
            <div class="container-fluid">
                <span class="navbar-brand mb-0 h1">🌴 obj:E_ChartTable</span>
            </div>
        </nav>
    </header>

    <div class="container">

        <div class="alert tropical-alert mb-3" role="alert">
            <p>obj:Eの差分まとめ</p>
            <hr>
            <p>E-4　～sl0</p>
            <p>E-3　sl1～sl4</p>
            <p>E-2　sl5～sl8</p>
            <p>E-1　sl9～sl12</p>
            <p>E0以降　Stella難易度表準拠</p>
            <hr>
            <p>
                <a href="https://drive.google.com/file/d/1UAVZHWm347igtNr-5iDOhnTQzuwjbYrq/view?usp=sharing">
                    段位認定コース（LR2用）
                </a>
            </p>
        </div>

        <!-- テーブル -->
        <div>
            <table class="table tropical-table" id="table_int"></table>
        </div>

    </div>

    <script>
        $(document).ready(function () {
            $.getJSON($("meta[name=bmstable]").attr("content"), function (header) {
                $.getJSON(header.data_url, function (information) {
                    makeBMSTable(information, header.symbol);
                });
            });
        });

        function makeBMSTable(info, mark) {
            var x = "";
            var count = 0;
            var obj = $("#table_int");

            obj.html("");
            $("<thead class='tropical-thead'><tr><th>Level</th><th>Title</th><th>Artist</th><th>Comment</th></tr></thead><tbody>")
                .appendTo(obj);

            var obj_sep = null;

            for (var i = 0; i < info.length; i++) {
                if (x != info[i].level) {
                    if (obj_sep != null) {
                        obj_sep.html("<td colspan='4'><b>" + mark + x + " (" + count + "譜面)</b></td>");
                    }
                    obj_sep = $("<tr class='tropical-sep'></tr>");
                    obj_sep.appendTo(obj);
                    count = 0;
                    x = info[i].level;
                }

                var str = $("<tr></tr>");

                $("<td>" + mark + x + "</td>").appendTo(str);

                if (info[i].md5) {
                    $("<td><a href='http://www.dream-pro.info/~lavalse/LR2IR/search.cgi?mode=ranking&bmsmd5=" + info[i].md5 + "' target='_blank'>" + info[i].title + "</a></td>").appendTo(str);
                } else {
                    $("<td><a href='https://mocha-repository.info/song.php?sha256=" + info[i].sha256 + "' target='_blank'>" + info[i].title + "</a></td>").appendTo(str);
                }

                $("<td>" + info[i].artist + "</td>").appendTo(str);
                $("<td>" + info[i].comment + "</td>").appendTo(str);

                str.appendTo(obj);
                count++;
            }

            $("</tbody>").appendTo(obj);

            if (obj_sep != null) {
                obj_sep.html("<td colspan='4'><b>" + mark + x + " (" + count + "譜面)</b></td>");
            }
        }
    </script>

</body>
</html>
